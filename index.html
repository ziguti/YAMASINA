<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>山科歴史デジタルアーカイブ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" rel="stylesheet">
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        :root { --primary-brown: #4e342e; --accent-gold: #bda06d; --bg-cream: #fdfaf2; --header-height: 60px; --sub-header-height: 55px; }
        body, html { margin: 0; padding: 0; background-color: var(--bg-cream); font-family: "Sawarabi Mincho", serif; color: #333; height: 100%; overflow: hidden; }
        header { position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height); background: #fff; border-bottom: 2px solid var(--accent-gold); display: flex; align-items: center; justify-content: space-between; padding: 0 20px; z-index: 3000; box-sizing: border-box; }
        .archive-title { font-size: 1.4rem; font-weight: bold; color: var(--primary-brown); }
        .sub-header { position: fixed; top: var(--header-height); left: 0; width: 100%; height: var(--sub-header-height); background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(8px); display: flex; align-items: center; padding: 0 15px; z-index: 2500; border-bottom: 1px solid #ddd; box-sizing: border-box; gap: 10px; }
        .mode-btn { border: 1px solid var(--accent-gold); background: #fff; font-size: 0.9rem; padding: 6px 16px; cursor: pointer; border-radius: 4px; font-family: inherit; color: var(--primary-brown); }
        .mode-btn.active { background: var(--accent-gold); color: #fff; }
        .page { position: absolute; top: calc(var(--header-height) + var(--sub-header-height)); bottom: 0; width: 100%; display: none; }
        .page.active { display: block; }
        #map { width: 100%; height: 100%; background: #eee; }
        .map-overlay-controls { position: absolute; bottom: 25px; right: 15px; z-index: 1000; background: rgba(255,255,255,0.95); padding: 10px; border-radius: 8px; border: 1px solid var(--accent-gold); width: 150px; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; padding: 15px; }
        .photo-card { background: #fff; border: 1px solid var(--accent-gold); border-radius: 4px; overflow: hidden; cursor: pointer; }
        .photo-card img { width: 100%; height: 100px; object-fit: cover; }
        #detail-modal { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.8); z-index:5000; justify-content:center; align-items:center; }
        .modal-content { background: var(--bg-cream); width: 90%; max-width: 600px; padding: 20px; border-radius: 8px; position: relative; }
    </style>
</head>
<body>

<header>
    <div class="archive-title">山科歴史アーカイブ</div>
    <div style="display:flex; gap:10px;">
        <button id="btn-map" class="mode-btn active" onclick="showPage('map')">マップ</button>
        <button id="btn-db" class="mode-btn" onclick="showPage('db')">古写真</button>
    </div>
</header>

<div id="map-ui" class="sub-header">
    <button id="m-btn-layers" class="mode-btn active" onclick="switchControl('layers')">レイヤ</button>
    <button id="m-btn-slider" class="mode-btn" onclick="switchControl('slider')">時代</button>
    <div id="slider-container" style="display:none; flex-grow:1; align-items:center; gap:10px;">
        <input type="range" id="era-slider" min="0" max="5" step="1" value="5" style="flex-grow:1;">
        <span id="era-label" style="font-size:0.8rem; min-width:80px;">現代写真</span>
    </div>
</div>

<div id="db-ui" class="sub-header" style="display:none;">
    <input type="text" id="db-search" placeholder="検索..." oninput="filterDB()" style="flex-grow:1; padding:5px; border:1px solid var(--accent-gold);">
</div>

<div id="page-map" class="page active">
    <div id="map"></div>
    <div class="map-overlay-controls">
        <span id="opacity-target" style="font-size:0.7rem; display:block;">調整：未選択</span>
        <input type="range" id="opacity-slider" min="0" max="1" step="0.1" value="1" style="width:100%;">
    </div>
</div>

<div id="page-db" class="page">
    <div style="height:100%; overflow-y:auto;"><div id="photo-list" class="photo-grid"></div></div>
</div>

<div id="detail-modal" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
        <div id="modal-body"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const SHEET_ID = '1JNOhsD4k1GzEVnUqS2ftN8ytw2GbraXjEFysoxwVl_A';
    let map, archiveData = [];
    let activeOverlays = [];
    const layers = {};

    const eras = [
        { name: "明治地籍図", url: "./地籍図tile/{z}/{x}/{y}.png" },
        { name: "大正測量図", url: "./taisho1922/{z}/{x}/{y}.jpg" },
        { name: "1946年", url: "https://cyberjapandata.gsi.go.jp/xyz/ort_USA10/{z}/{x}/{y}.png" },
        { name: "1961年", url: "https://cyberjapandata.gsi.go.jp/xyz/ort_old10/{z}/{x}/{y}.png" },
        { name: "1974年", url: "https://cyberjapandata.gsi.go.jp/xyz/gazo1/{z}/{x}/{y}.jpg" },
        { name: "現代写真", url: "https://cyberjapandata.gsi.go.jp/xyz/ort/{z}/{x}/{y}.jpg" }
    ];

    window.onload = function() {
        initMap();
        loadPhotoData();
    };

    function initMap() {
        map = L.map('map', { zoomControl: false }).setView([34.992, 135.813], 15);
        
        L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
            attribution: "地理院", maxNativeZoom: 18, maxZoom: 22
        }).addTo(map);

        eras.forEach(era => {
            layers[era.name] = L.tileLayer(era.url, { maxNativeZoom: 18, maxZoom: 22 });
        });

        L.control.layers(null, layers, { position: 'topright' }).addTo(map);

        map.on('overlayadd', (e) => {
            if (!activeOverlays.includes(e.layer)) activeOverlays.push(e.layer);
            updateOpacityInfo();
        });

        document.getElementById('opacity-slider').oninput = function() {
            if (activeOverlays.length > 0) activeOverlays[activeOverlays.length-1].setOpacity(this.value);
        };

        document.getElementById('era-slider').oninput = function() {
            const era = eras[this.value];
            document.getElementById('era-label').innerText = era.name;
            activeOverlays.forEach(l => map.removeLayer(l));
            activeOverlays = [layers[era.name]];
            layers[era.name].addTo(map);
        };
    }

    function updateOpacityInfo() {
        if (activeOverlays.length > 0) {
            const latest = activeOverlays[activeOverlays.length-1];
            const name = Object.keys(layers).find(k => layers[k] === latest);
            document.getElementById('opacity-target').innerText = "調整：" + name;
        }
    }

    async function loadPhotoData() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`);
            const csv = await res.text();
            const rows = csv.split('\n').slice(1);
            archiveData = rows.map((row, i) => {
                const c = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/"/g, '').trim());
                return { id: i, drive_id: c[1], title: c[4]||"無題", coords: c[6]?c[6].split(',').map(Number):null, era: c[11]||"" };
            }).filter(d => d.drive_id);
            renderPhotos(archiveData);
        } catch (e) { console.error(e); }
    }

    function renderPhotos(data) {
        document.getElementById('photo-list').innerHTML = data.map(p => `
            <div class="photo-card" onclick="openDetail(${p.id})">
                <img src="https://lh3.googleusercontent.com/d/${p.drive_id}" onerror="this.src='https://placehold.jp/24/4e342e/ffffff/150x100.png?text=NoImage'">
                <p style="font-size:0.7rem; padding:5px; margin:0;">${p.title}</p>
            </div>
        `).join('');
    }

    function openDetail(id) {
        const p = archiveData.find(x => x.id === id);
        document.getElementById('modal-body').innerHTML = `<h3>${p.title}</h3><img src="https://lh3.googleusercontent.com/d/${p.drive_id}" style="width:100%;">`;
        document.getElementById('detail-modal').style.display = 'flex';
    }

    function showPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('page-' + page).classList.add('active');
        document.getElementById('map-ui').style.display = (page === 'map') ? 'flex' : 'none';
        document.getElementById('db-ui').style.display = (page === 'db') ? 'flex' : 'none';
        if (page === 'map') setTimeout(() => map.invalidateSize(), 100);
    }

    function switchControl(m) {
        document.getElementById('slider-container').style.display = (m === 'slider') ? 'flex' : 'none';
    }

    function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }
</script>
</body>
</html>

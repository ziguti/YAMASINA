<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山科歴史デジタルアーカイブ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" />
    <style>
        :root {
            --primary-brown: #4e342e;
            --accent-gold: #bda06d;
            --bg-cream: #fdfaf2;
            --header-height: 55px;
        }

        body, html { margin: 0; padding: 0; background-color: var(--bg-cream); font-family: "Yu Mincho", serif; color: #333; height: 100%; overflow: hidden; }

        header {
            position: fixed; top: 0; left: 0; width: 100%; height: var(--header-height);
            background: #fff; border-bottom: 1px solid var(--accent-gold);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 12px; z-index: 2000; box-sizing: border-box;
        }
        .logo { font-weight: bold; color: var(--primary-brown); font-size: 1rem; }

        .nav-buttons button {
            background: none; border: 1px solid var(--accent-gold); padding: 5px 10px;
            cursor: pointer; font-family: inherit; margin-left: 4px; border-radius: 2px;
            font-size: 0.8rem;
        }
        .nav-buttons button.active { background: var(--primary-brown); color: #fff; }

        .sub-nav {
            position: fixed; top: calc(var(--header-height) + 10px); left: 10px; right: 10px;
            background: rgba(255, 255, 255, 0.9); display: flex; align-items: center; gap: 10px;
            padding: 8px 12px; z-index: 1500; border: 1px solid var(--accent-gold);
            border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        
        .mode-btn { border: none; background: #eee; padding: 4px 12px; cursor: pointer; font-size: 0.75rem; border-radius: 15px; }
        .mode-btn.active { background: var(--accent-gold); color: white; }

        .control-panel { flex-grow: 1; display: none; align-items: center; }
        .control-panel.active { display: flex; }

        .page { display: none; height: calc(100vh - var(--header-height)); margin-top: var(--header-height); position: relative; }
        .page.active { display: block; }
        #map { width: 100%; height: 100%; }

        /* 比較用コントロール */
        .map-overlay-controls {
            position: absolute; bottom: 20px; right: 10px; z-index: 1000;
            background: rgba(255,255,255,0.9); padding: 10px; border-radius: 8px;
            border: 1px solid var(--accent-gold); width: 160px;
        }
        .control-desc { font-size: 0.65rem; color: #666; margin-bottom: 5px; line-height: 1.2; }

        /* データベース画像表示の修正 */
        .database-container { padding: 15px; height: 100%; overflow-y: auto; box-sizing: border-box; }
        .photo-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; }
        .photo-card { background: #fff; padding: 5px; border: 1px solid #eee; cursor: pointer; border-radius: 4px; }
        .photo-card img { width: 100%; height: 120px; object-fit: cover; border-radius: 2px; display: block; }
        .photo-card p { font-size: 0.75rem; margin: 5px 0; text-align: center; font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

        .popup-img { width: 100%; max-height: 150px; object-fit: cover; cursor: pointer; }
    </style>
</head>
<body>

<header id="main-header">
    <div class="logo"><i class="fa-solid fa-map-location-dot"></i> 山科アーカイブ</div>
    <div class="nav-buttons">
        <button id="btn-map" class="active" onclick="showPage('map')">地図</button>
        <button id="btn-db" onclick="showPage('db')">写真</button>
    </div>
</header>

<div id="page-map" class="page active">
    <div class="sub-nav">
        <div class="mode-switch">
            <button id="mode-btn-layers" class="mode-btn active" onclick="switchControl('layers')"><i class="fa-solid fa-layer-group"></i></button>
            <button id="mode-btn-slider" class="mode-btn" onclick="switchControl('slider')"><i class="fa-solid fa-clock"></i></button>
        </div>
        <div id="panel-slider" class="control-panel">
            <input type="range" id="timeline-slider" style="flex-grow:1;" min="0" max="5" step="1" value="5">
            <span id="timeline-label" style="font-size:0.7rem; margin-left:8px; font-weight:bold;">最新写真</span>
        </div>
        <div id="panel-layers" class="control-panel active">
            <span style="font-size:0.7rem; color:#444;">右上の選択肢から2つまで比較可能</span>
        </div>
    </div>

    <div id="map"></div>

    <div class="map-overlay-controls">
        <div id="comparison-target" class="control-desc">比較レイヤー未選択</div>
        <input type="range" id="opacity-slider" min="0" max="1" step="0.1" value="0.8" style="width:100%;">
    </div>
</div>

<div id="page-db" class="page">
    <div class="database-container">
        <input type="text" id="db-search" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid var(--accent-gold);" placeholder="検索..." oninput="filterDB()">
        <div id="photo-list" class="photo-grid"></div>
    </div>
</div>

<div id="detail-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.9); z-index:3000; justify-content:center; align-items:center; padding:15px;" onclick="this.style.display='none'">
    <div class="modal-content" onclick="event.stopPropagation()" style="background:#fff; width:100%; max-width:600px; padding:20px; border-radius:4px;">
        <div id="modal-body"></div>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const SHEET_ID = '1JNOhsD4k1GzEVnUqS2ftN8ytw2GbraXjEFysoxwVl_A';
    let map, archiveData = [], layerControl, baseMap;
    let allLayers = {}, activeOverlays = [];

    // 画像URL生成の修正
    const getImgUrl = (id) => `https://lh3.googleusercontent.com/d/${id}=s600`;

    function initMap() {
        map = L.map('map', { zoomControl: false, maxZoom: 22 }).setView([34.992, 135.813], 15);
        L.control.zoom({ position: 'bottomleft' }).addTo(map);

        baseMap = L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', { maxNativeZoom: 18, maxZoom: 22 }).addTo(map);

        const tileConfig = { maxNativeZoom: 18, maxZoom: 22, opacity: 1.0 };
        allLayers = {
            "明治地籍図": L.tileLayer('./地籍図tile/{z}/{x}/{y}.png', tileConfig),
            "大正測量図": L.tileLayer('./taisho1922/{z}/{x}/{y}.jpg', tileConfig),
            "1946年写真": L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/ort_USA10/{z}/{x}/{y}.png', tileConfig),
            "1961年写真": L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/ort_old10/{z}/{x}/{y}.png', tileConfig),
            "1974年写真": L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/gazo1/{z}/{x}/{y}.jpg', tileConfig),
            "最新写真": L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/ort/{z}/{x}/{y}.jpg', tileConfig)
        };

        // レイヤ選択の復活
        layerControl = L.control.layers(null, allLayers, { position: 'topright', collapsed: false }).addTo(map);

        // 時代スライダー用の紐付け
        const sliderLayers = [allLayers["明治地籍図"], allLayers["大正測量図"], allLayers["1946年写真"], allLayers["1961年写真"], allLayers["1974年写真"], allLayers["最新写真"]];
        const labels = ["明治地籍図", "大正測量図", "1946年写真", "1961年写真", "1974年写真", "最新写真"];

        document.getElementById('timeline-slider').oninput = function() {
            const val = parseInt(this.value);
            document.getElementById('timeline-label').innerText = labels[val];
            Object.values(allLayers).forEach(l => map.removeLayer(l));
            sliderLayers[val].addTo(map);
            activeOverlays = [sliderLayers[val]];
            sliderLayers[val].setOpacity(1.0); // スライダーモードは基本不透明
        };

        // レイヤー比較ロジック：2つまで
        map.on('overlayadd', function(e) {
            activeOverlays.push(e.layer);
            if (activeOverlays.length > 2) {
                map.removeLayer(activeOverlays.shift());
            }
            updateComparisonUI();
        });

        map.on('overlayremove', function(e) {
            activeOverlays = activeOverlays.filter(l => l !== e.layer);
            updateComparisonUI();
        });

        function updateComparisonUI() {
            const targetDisplay = document.getElementById('comparison-target');
            if (activeOverlays.length === 2) {
                // 2番目に選んだレイヤーの名前を探す
                const name = Object.keys(allLayers).find(key => allLayers[key] === activeOverlays[1]);
                targetDisplay.innerText = `調整中：${name}`;
                activeOverlays[0].setOpacity(1.0); // 1つ目は不透明固定
                activeOverlays[1].setOpacity(document.getElementById('opacity-slider').value);
            } else {
                targetDisplay.innerText = "比較レイヤー未選択";
                if (activeOverlays[0]) activeOverlays[0].setOpacity(1.0);
            }
        }

        document.getElementById('opacity-slider').oninput = function() {
            if (activeOverlays.length === 2) {
                activeOverlays[1].setOpacity(this.value);
            }
        };
    }

    async function loadData() {
        try {
            const res = await fetch(`https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`);
            const csv = await res.text();
            const rows = csv.split('\n').slice(1);
            archiveData = rows.map((row, index) => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                // .jpg 除去
                const cleanTitle = cols[4] ? cols[4].replace(/\.jpg$/i, '') : "無題";
                return { id: index, drive_id: cols[1], title: cleanTitle, coords: cols[6], desc: cols[9] };
            }).filter(d => d.drive_id);
            renderDB(archiveData);
            renderMarkers(archiveData);
        } catch (e) { console.error(e); }
    }

    function renderDB(data) {
        document.getElementById('photo-list').innerHTML = data.map(item => `
            <div class="photo-card" onclick="openDetail(${item.id})">
                <img src="${getImgUrl(item.drive_id)}" loading="lazy">
                <p>${item.title}</p>
            </div>
        `).join('');
    }

    function renderMarkers(data) {
        data.forEach(item => {
            if (!item.coords) return;
            const [lat, lng] = item.coords.split(',').map(Number);
            const popupContent = `
                <div onclick="openDetail(${item.id})" style="cursor:pointer; width:150px;">
                    <img class="popup-img" src="${getImgUrl(item.drive_id)}">
                    <div style="font-size:0.8rem; font-weight:bold; text-align:center; padding:5px;">${item.title}</div>
                </div>
            `;
            L.marker([lat, lng]).addTo(map).bindPopup(popupContent);
        });
    }

    function openDetail(id) {
        const item = archiveData.find(d => d.id === id);
        document.getElementById('modal-body').innerHTML = `
            <h3 style="margin:0 0 10px; font-size:1.1rem;">${item.title}</h3>
            <img src="${getImgUrl(item.drive_id)}" style="width:100%; border-radius:2px;">
            <p style="font-size:0.85rem; line-height:1.6; margin-top:10px;">${item.desc || ""}</p>
        `;
        document.getElementById('detail-modal').style.display = 'flex';
        map.closePopup();
    }

    function switchControl(mode) {
        document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
        document.querySelectorAll('.control-panel').forEach(p => p.classList.remove('active'));
        document.getElementById('mode-btn-' + mode).classList.add('active');
        document.getElementById('panel-' + mode).classList.add('active');
    }

    function showPage(p) {
        document.querySelectorAll('.page').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.nav-buttons button').forEach(el => el.classList.remove('active'));
        document.getElementById('page-' + p).classList.add('active');
        document.getElementById('btn-' + p).classList.add('active');
        if (p === 'map') setTimeout(() => map.invalidateSize(), 200);
    }

    function filterDB() {
        const q = document.getElementById('db-search').value.toLowerCase();
        renderDB(archiveData.filter(d => d.title.toLowerCase().includes(q)));
    }

    initMap();
    loadData();
</script>
</body>
</html>

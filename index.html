<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>山科歴史デジタルアーカイブ</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --font-serif: "Yu Mincho", "YuMincho", "Hiragino Mincho ProN", "MS PMincho", serif;
            --primary-brown: #4e342e;
            --bg-cream: #fdfaf2;
        }

        body, html {
            margin: 0; padding: 0;
            background-color: var(--bg-cream);
            font-family: var(--font-serif);
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* --- 1. メインビジュアル（アニメーション強化） --- */
        .hero {
            position: relative;
            width: 100%;
            height: 100vh;
            background: #222; /* 画像がない時の予備色 */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .hero-img {
            position: absolute;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0;
            /* 下から滑り込みながらふわっと浮き上がる */
            transform: translateY(30px);
            animation: heroReveal 1.8s ease-out forwards;
        }

        @keyframes heroReveal {
            to { opacity: 0.6; transform: translateY(0); }
        }

        .hero-title {
            position: relative;
            color: #fff;
            font-size: clamp(1.5rem, 5vw, 3.5rem);
            letter-spacing: 0.5rem;
            text-align: center;
            z-index: 10;
            opacity: 0;
            /* 文字は少し遅れて浮き上がる */
            animation: textFadeUp 2s 0.8s ease-out forwards;
            text-shadow: 2px 2px 15px rgba(0,0,0,0.7);
        }

        @keyframes textFadeUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- 2. ナビゲーション（画像ボタン） --- */
        .nav-section {
            max-width: 1100px;
            margin: -50px auto 50px;
            padding: 0 20px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
            z-index: 20;
            position: relative;
        }

        .nav-card {
            background: #fff;
            border-radius: 2px;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            text-decoration: none;
            color: var(--primary-brown);
            transition: all 0.4s cubic-bezier(0.25, 1, 0.5, 1);
            text-align: center;
        }

        /* カーソルを合わせると大きくなる */
        .nav-card:hover {
            transform: translateY(-10px) scale(1.04);
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        .nav-card img {
            width: 100%; height: 160px;
            object-fit: cover;
            transition: 0.5s;
        }

        .nav-card span {
            display: block; padding: 18px;
            font-size: 1.1rem; font-weight: bold;
        }

        /* --- 3. マップ --- */
        #map-container { padding: 50px 20px; max-width: 1300px; margin: 0 auto; }
        #map {
            height: 650px; border: 1px solid #ccc; border-radius: 4px;
        }

        .refined-pin {
            background: var(--primary-brown); border: 2px solid #fff;
            border-radius: 50% 50% 50% 0; transform: rotate(-45deg);
            width: 24px !important; height: 24px !important;
        }
    </style>
</head>
<body>

<section class="hero">
    <img src="IMG_20250907_083738.jpg" class="hero-img" alt="風景画像">
    <h1 class="hero-title">山科歴史デジタルアーカイブ</h1>
</section>

<nav class="nav-section">
    <a href="#map-container" class="nav-card">
        <img src="https://via.placeholder.com/600x400/4e342e/ffffff?text=Old+Photos">
        <span>古写真アーカイブ</span>
    </a>
    <a href="#map-container" class="nav-card">
        <img src="https://via.placeholder.com/600x400/8d6e63/ffffff?text=Map">
        <span>山科マップ</span>
    </a>
    <a href="https://yamashina-furusato.com/" target="_blank" class="nav-card">
        <img src="https://via.placeholder.com/600x400/c0a062/ffffff?text=Link">
        <span>ふるさとの会</span>
    </a>
</nav>

<section id="map-container">
    <div id="map"></div>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
    const map = L.map('map').setView([34.992, 135.813], 15);
    L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/pale/{z}/{x}/{y}.png', {
        attribution: '&copy; 国土地理院'
    }).addTo(map);

    const SHEET_ID = '1JNOhsD4k1GzEVnUqS2ftN8ytw2GbraXjEFysoxwVl_A';
    
    async function loadData() {
        try {
            const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
            const response = await fetch(url);
            const csv = await response.text();
            const rows = csv.split('\n').slice(1);

            rows.forEach(row => {
                const cols = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(c => c.replace(/"/g, '').trim());
                const fileId = cols[1], title = cols[4], coords = cols[6], year = cols[7];

                if (coords && coords.includes(',')) {
                    const [lat, lng] = coords.split(',').map(n => parseFloat(n.trim()));
                    if (!isNaN(lat)) {
                        const imgUrl = fileId ? `https://drive.google.com/uc?export=view&id=${fileId}` : '';
                        L.marker([lat, lng], { icon: L.divIcon({ className: 'refined-pin' }) })
                         .addTo(map)
                         .bindPopup(`<h3 style="font-family:var(--font-serif)">${title}</h3><img src="${imgUrl}" style="width:100%">`);
                    }
                }
            });
        } catch (e) { console.error("Data Load Error"); }
    }
    loadData();
</script>
</body>
</html>

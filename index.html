<script>
    // --- 初期設定・データ ---
    // スプレッドシートIDは維持。CSV出力用のURLを生成
    const SHEET_ID = '1JNOhsD4k1GzEVnUqS2ftN8ytw2GbraXjEFysoxwVl_A';
    const CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;

    let map, layerControl, archiveData = [];
    let activeOverlays = []; 
    let userMarker, userCircle;

    const eras = [
        { name: "明治地籍図", url: "./地籍図tile/{z}/{x}/{y}.png", type: "png" },
        { name: "大正測量図", url: "./taisho1922/{z}/{x}/{y}.jpg", type: "jpg" },
        { name: "1946年写真", url: "https://cyberjapandata.gsi.go.jp/xyz/ort_USA10/{z}/{x}/{y}.png", type: "gsi" },
        { name: "1961年写真", url: "https://cyberjapandata.gsi.go.jp/xyz/ort_old10/{z}/{x}/{y}.png", type: "gsi" },
        { name: "1974年写真", url: "https://cyberjapandata.gsi.go.jp/xyz/gazo1/{z}/{x}/{y}.jpg", type: "gsi" },
        { name: "現代空中写真", url: "https://cyberjapandata.gsi.go.jp/xyz/ort/{z}/{x}/{y}.jpg", type: "gsi" }
    ];

    const layers = {};

    function initMap() {
        map = L.map('map', { zoomControl: false, maxZoom: 22 }).setView([34.992, 135.813], 15);
        L.control.zoom({ position: 'bottomleft' }).addTo(map);

        L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/std/{z}/{x}/{y}.png', {
            attribution: "地理院タイル",
            maxNativeZoom: 18,
            maxZoom: 22
        }).addTo(map);

        eras.forEach(era => {
            layers[era.name] = L.tileLayer(era.url, { maxNativeZoom: 18, maxZoom: 22 });
        });

        layerControl = L.control.layers(null, layers, { collapsed: true, position: 'topright' }).addTo(map);

        map.on('overlayadd', (e) => {
            if (activeOverlays.includes(e.layer)) return;
            activeOverlays.push(e.layer);
            if (activeOverlays.length > 2) {
                const oldest = activeOverlays.shift();
                map.removeLayer(oldest);
            }
            updateOpacityTarget();
        });

        map.on('overlayremove', (e) => {
            activeOverlays = activeOverlays.filter(l => l !== e.layer);
            updateOpacityTarget();
        });

        add3DMarkers();

        document.getElementById('opacity-slider').oninput = function() {
            if (activeOverlays.length > 0) {
                const target = activeOverlays[activeOverlays.length - 1];
                target.setOpacity(this.value);
            }
        };

        document.getElementById('era-slider').oninput = function() {
            const index = this.value;
            const era = eras[index];
            document.getElementById('era-label').innerText = era.name;
            activeOverlays.forEach(l => map.removeLayer(l));
            activeOverlays = [layers[era.name]];
            layers[era.name].addTo(map);
        };
    }

    // --- 古写真データ読み込み（修正ポイント） ---
    async function loadPhotoData() {
        try {
            const response = await fetch(CSV_URL);
            const csvText = await response.text();
            
            // CSVパース（簡易版：カンマ区切り、ダブルクォーテーション除去）
            const rows = csvText.split('\n').slice(1); // ヘッダーをスキップ
            archiveData = rows.filter(row => row.trim() !== "").map((row, index) => {
                // セル内のカンマを考慮しない簡易分割。複雑なデータの場合はライブラリ検討
                const cols = row.split(',').map(c => c.replace(/^"(.*)"$/, '$1'));
                return {
                    id: index,
                    title: cols[0] || "無題",
                    era: cols[1] || "不明",
                    lat: parseFloat(cols[2]),
                    lng: parseFloat(cols[3]),
                    img: cols[4] || "", // 画像URL
                    desc: cols[5] || "", // 解説
                    source: cols[6] || "" // 出典
                };
            });

            renderPhotos(archiveData);
            addPhotoMarkers(archiveData);
        } catch (error) {
            console.error("データ取得失敗:", error);
        }
    }

    function renderPhotos(data) {
        const list = document.getElementById('photo-list');
        list.innerHTML = data.map(p => `
            <div class="photo-card" onclick="openDetail(${p.id})">
                <img src="${p.img}" alt="${p.title}" onerror="this.src='https://placehold.jp/24/4e342e/ffffff/200x150.png?text=No%20Image'">
                <p>${p.title}</p>
            </div>
        `).join('');
    }

    function addPhotoMarkers(data) {
        const iconCam = L.divIcon({
            html: '<i class="fa-solid fa-camera" style="color:var(--primary-brown); font-size:20px; text-shadow: 0 0 3px #fff;"></i>',
            className: 'photo-pin', iconSize: [20, 20]
        });
        data.forEach(p => {
            if (!isNaN(p.lat) && !isNaN(p.lng)) {
                L.marker([p.lat, p.lng], { icon: iconCam }).addTo(map).bindPopup(`
                    <div style="text-align:center;">
                        <b>${p.title}</b><br>
                        <img src="${p.img}" style="width:100px; margin:5px 0;"><br>
                        <button class="mode-btn" onclick="openDetail(${p.id})">詳細を表示</button>
                    </div>
                `);
            }
        });
    }

    // 以下、openDetail, focusOnMap, closeModal 等のUI関数は変更なしのため省略
    // (提供されたコードのものをそのまま使用してください)
    
    function updateOpacityTarget() {
        const display = document.getElementById('opacity-target');
        if (activeOverlays.length > 0) {
            const latest = activeOverlays[activeOverlays.length - 1];
            const name = Object.keys(layers).find(key => layers[key] === latest);
            display.innerText = `調整：${name}`;
            document.getElementById('opacity-slider').value = latest.options.opacity || 1.0;
        } else {
            display.innerText = "透過度：未選択";
        }
    }

    function add3DMarkers() {
        const models = [
            { name: "妙見寺開渠", file: "妙見寺開渠.glb", coords: [34.977573, 135.827704] },
            { name: "両御坊道道標", file: "両御坊道道標.glb", coords: [34.985075, 135.823981] },
            { name: "旧井戸跡地", file: "旧井戸跡地.glb", coords: [34.983122, 135.814421] }
        ];
        const icon3d = L.divIcon({
            html: '<i class="fa-solid fa-cube" style="color:#e67e22; font-size:24px; text-shadow: 0 0 3px #fff;"></i>',
            className: 'custom-div-icon',
            iconSize: [24, 24]
        });
        models.forEach(m => {
            L.marker(m.coords, { icon: icon3d }).addTo(map).bindPopup(`
                <div style="text-align:center; width:200px;">
                    <b style="font-size:1rem;">${m.name}</b>
                    <model-viewer src="./${encodeURIComponent(m.file)}" auto-rotate camera-controls class="model-viewer-box"></model-viewer>
                    <button class="mode-btn" onclick="open3DFullScreen('./${encodeURIComponent(m.file)}')">全画面表示</button>
                </div>
            `);
        });
    }

    function showPage(page) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('header .mode-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + page).classList.add('active');
        document.getElementById('btn-' + page).classList.add('active');
        document.getElementById('map-ui').style.display = (page === 'map') ? 'flex' : 'none';
        document.getElementById('db-ui').style.display = (page === 'db') ? 'flex' : 'none';
        if (page === 'map') setTimeout(() => map.invalidateSize(), 200);
    }

    function switchControl(mode) {
        const isSlider = (mode === 'slider');
        document.getElementById('slider-container').style.display = isSlider ? 'flex' : 'none';
        document.getElementById('m-btn-layers').classList.toggle('active', !isSlider);
        document.getElementById('m-btn-slider').classList.toggle('active', isSlider);
    }

    function requestLocation() {
        map.locate({ setView: true, maxZoom: 16, enableHighAccuracy: true });
    }

    map?.on('locationfound', e => {
        if (userMarker) map.removeLayer(userMarker);
        userCircle = L.circle(e.latlng, { radius: e.accuracy / 2, color: '#2196F3', fillOpacity: 0.1 }).addTo(map);
        userMarker = L.circleMarker(e.latlng, { radius: 8, color: '#fff', fillColor: '#2196F3', fillOpacity: 1, weight: 3 }).addTo(map);
    });

    function openDetail(id) {
        const p = archiveData.find(x => x.id === id);
        if(!p) return;
        showPage('db');
        const body = document.getElementById('modal-body');
        body.innerHTML = `
            <h2 style="color:var(--primary-brown); border-bottom: 2px solid var(--accent-gold);">${p.title}</h2>
            <img src="${p.img}" style="width:100%; border:1px solid #ddd; margin-bottom:15px;" onerror="this.src='https://placehold.jp/24/4e342e/ffffff/400x300.png?text=No%20Image'">
            <table style="width:100%; border-collapse:collapse; font-size:0.9rem;">
                <tr><th style="text-align:left; padding:8px; background:#eee; width:30%;">年代</th><td style="padding:8px;">${p.era}</td></tr>
                <tr><th style="text-align:left; padding:8px; background:#eee;">解説</th><td style="padding:8px;">${p.desc}</td></tr>
                <tr><th style="text-align:left; padding:8px; background:#eee;">出典</th><td style="padding:8px;">${p.source}</td></tr>
            </table>
            <button class="mode-btn" style="width:100%; margin-top:20px;" onclick="focusOnMap([${p.lat}, ${p.lng}])">地図で場所を確認</button>
        `;
        document.getElementById('detail-modal').style.display = 'flex';
    }

    function focusOnMap(coords) {
        closeModal();
        showPage('map');
        map.setView(coords, 18);
    }

    function closeModal() { document.getElementById('detail-modal').style.display = 'none'; }

    function open3DFullScreen(url) {
        const body = document.getElementById('modal-body');
        body.innerHTML = `<model-viewer src="${url}" auto-rotate camera-controls style="width:100%; height:80vh;"></model-viewer>`;
        document.getElementById('detail-modal').style.display = 'flex';
    }

    function filterDB() {
        const q = document.getElementById('db-search').value.toLowerCase();
        const era = document.getElementById('era-filter').value;
        const filtered = archiveData.filter(p => p.title.includes(q) && (!era || p.era.includes(era)));
        renderPhotos(filtered);
    }

    initMap();
    loadPhotoData();
</script>
